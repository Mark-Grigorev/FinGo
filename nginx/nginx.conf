worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # API → Go backend
        location /api/ {
            proxy_pass         http://localhost:8080;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_unavailable;
        }

        location @api_unavailable {
            default_type application/json;
            return 503 '{"message":"Сервис недоступен"}';
        }

        # CSS и JS — всегда перепроверять через ETag
        location ~* \.(css|js)$ {
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Картинки и шрифты — долгий кэш (файлы не меняются)
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
            add_header Cache-Control "public, max-age=2592000";
        }

        # HTML — всегда перепроверять (подхватит новые версии CSS/JS)
        location / {
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri $uri.html $uri/ /index.html;
        }
    }
}