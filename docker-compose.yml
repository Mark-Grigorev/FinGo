services:
  postgres:
    image: postgres:17-alpine
    container_name: fingo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fingo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fingo_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fingo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fingo} -d ${POSTGRES_DB:-fingo}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.fingo
      args:
        VERSION: ${VERSION:-dev}
    container_name: fingo_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_CONN_STRING=postgres://${POSTGRES_USER:-fingo}:${POSTGRES_PASSWORD:-fingo_secret}@postgres:5432/${POSTGRES_DB:-fingo}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8008"
    volumes:
      - uploads_data:/app/uploads

  nginx:
    image: nginx:1.27-alpine
    container_name: fingo_nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx-dev.conf:/etc/nginx/nginx.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - app

volumes:
  postgres_data:
  uploads_data:
