<!DOCTYPE html>
<html lang="ru" x-cloak>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinGo — Регулярные платежи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
      <span>FinGo</span>
    </div>
    <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Главная</span></a>
    <a href="accounts.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>Счета</span></a>
    <a href="transactions.html" class="nav-item active"><svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg><span>Транзакции</span></a>
    <a href="categories.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><span>Вводы</span></a>
    <a href="reports.html" class="nav-item"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Аналитика</span></a>
    <div class="sidebar-spacer"></div>
    <a href="#" class="nav-item" onclick="logout();return false;"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Выйти</span></a>
  </aside>

  <main class="main-content" x-data="recurringPage()">
    <div class="page-header">
      <div class="page-title">
        <h1>Регулярные платежи</h1>
      </div>
      <a href="#" class="btn btn-primary">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Добавить платёж
      </a>
    </div>

    <!-- Error state -->
    <div x-show="error" class="error-state" x-text="error"></div>

    <!-- Skeleton — summary cards -->
    <div class="stats-grid" style="margin-bottom:24px" x-show="loading">
      <div class="skeleton skeleton-card" style="height:72px"></div>
      <div class="skeleton skeleton-card" style="height:72px"></div>
      <div class="skeleton skeleton-card" style="height:72px"></div>
    </div>

    <!-- Summary cards -->
    <div class="stats-grid" style="margin-bottom:24px" x-show="!loading && !error">
      <div class="stat-card">
        <div class="stat-label">Всего в месяц</div>
        <div class="stat-value" x-text="fmt.money(summary.monthly_total)"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Активных</div>
        <div class="stat-value" x-text="summary.active_count"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Следующий списания</div>
        <div class="stat-value" style="font-size:22px" x-text="summary.next_date ? fmt.date(summary.next_date) : '—'"></div>
      </div>
    </div>

    <!-- Skeleton — list -->
    <div x-show="loading" style="display:flex;flex-direction:column;gap:0">
      <div class="skeleton skeleton-row" style="height:72px;margin-bottom:2px"></div>
      <div class="skeleton skeleton-row" style="height:72px;margin-bottom:2px"></div>
      <div class="skeleton skeleton-row" style="height:72px;margin-bottom:2px"></div>
      <div class="skeleton skeleton-row" style="height:72px;margin-bottom:2px"></div>
    </div>

    <!-- Recurring list -->
    <div x-show="!loading && !error" style="display:flex;flex-direction:column;gap:0">
      <template x-for="p in payments" :key="p.id">
        <div class="recurring-item" :style="p.status === 'overdue' ? 'border:1px solid var(--destructive)' : ''">
          <div class="recurring-icon" x-text="p.icon ?? '💳'"></div>
          <div class="recurring-info">
            <div class="recurring-name" x-text="p.name"></div>
            <div class="recurring-desc" x-text="p.description"></div>
          </div>
          <div class="recurring-amount amount-neg" x-text="fmt.money(p.amount)"></div>
          <template x-if="p.status === 'overdue'">
            <a href="#" class="btn btn-primary" style="font-size:12px;padding:6px 12px">Оплатить сейчас</a>
          </template>
          <template x-if="p.status !== 'overdue'">
            <a href="#" class="btn btn-ghost" style="font-size:12px;padding:6px 12px" @click.prevent="cancel(p.id)">Отменить</a>
          </template>
        </div>
      </template>
    </div>
  </main>
</div>

<script>
  function recurringPage() {
    return {
      loading: true, error: null,
      summary: { monthly_total:0, active_count:0, next_date:'' },
      payments: [],
      async init() {
        try {
          const res = await api.get('/recurring');
          this.summary = res.summary ?? {};
          this.payments = res.items ?? res;
        } catch(e) { this.error = e.message; }
        finally { this.loading = false; }
      },
      async cancel(id) {
        if (!confirm('Отменить платёж?')) return;
        await api.delete('/recurring/' + id);
        this.payments = this.payments.filter(p => p.id !== id);
        this.summary.active_count--;
      }
    };
  }
</script>
</body>
</html>
