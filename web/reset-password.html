<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinGo — Новый пароль</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css?v=2" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <div class="logo-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
            </svg>
          </div>
          FinGo
        </div>
        <h1 class="auth-title">Новый пароль</h1>
        <p class="auth-subtitle">Придумайте новый пароль для вашего аккаунта</p>
      </div>

      <!-- Невалидный/просроченный токен -->
      <div id="invalidTokenBox" style="display:none;color:var(--destructive);font-size:13px;margin-bottom:16px;padding:12px 14px;background:rgba(255,92,51,0.1);border-radius:8px;border:1px solid rgba(255,92,51,0.3)">
        Ссылка недействительна или истекла. <a href="/forgot-password">Запросить новую</a>
      </div>

      <!-- Успех -->
      <div id="successBox" style="display:none;color:#16a34a;font-size:13px;margin-bottom:16px;padding:12px 14px;background:rgba(22,163,74,0.08);border-radius:8px;border:1px solid rgba(22,163,74,0.3)">
        Пароль успешно изменён. <a href="/">Войти</a>
      </div>

      <form id="resetForm" onsubmit="handleReset(event)">
        <div class="form-group">
          <label class="form-label">Новый пароль</label>
          <div class="input-wrapper">
            <input type="password" id="pwd" class="form-input" placeholder="Минимум 6 символов" required minlength="6" />
            <span class="input-icon" onclick="togglePwd('pwd', 'eye-icon-1')">
              <svg id="eye-icon-1" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Повторите пароль</label>
          <div class="input-wrapper">
            <input type="password" id="pwd2" class="form-input" placeholder="••••••••" required />
            <span class="input-icon" onclick="togglePwd('pwd2', 'eye-icon-2')">
              <svg id="eye-icon-2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
        </div>

        <div id="resetError" style="display:none;color:var(--destructive);font-size:13px;margin-bottom:12px;padding:10px 14px;background:rgba(255,92,51,0.1);border-radius:8px;border:1px solid rgba(255,92,51,0.3)"></div>

        <button type="submit" id="resetBtn" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;">
          Сохранить пароль
        </button>
      </form>

      <p class="auth-footer" id="footerLink">
        <a href="/">← Вернуться ко входу</a>
      </p>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('invalidTokenBox').style.display = 'block';
    }

    function togglePwd(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    async function handleReset(e) {
      e.preventDefault();
      const btn = document.getElementById('resetBtn');
      const errBox = document.getElementById('resetError');
      const pwd = document.getElementById('pwd').value;
      const pwd2 = document.getElementById('pwd2').value;

      errBox.style.display = 'none';

      if (pwd !== pwd2) {
        errBox.textContent = 'Пароли не совпадают';
        errBox.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Сохранение...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: pwd }),
        });

        if (res.ok || res.status === 204) {
          document.getElementById('resetForm').style.display = 'none';
          document.getElementById('successBox').style.display = 'block';
          return;
        }

        if (res.status === 400) {
          document.getElementById('resetForm').style.display = 'none';
          document.getElementById('invalidTokenBox').style.display = 'block';
          return;
        }

        const data = await res.json().catch(() => ({}));
        errBox.textContent = data.message || 'Ошибка сервера';
        errBox.style.display = 'block';
      } catch {
        errBox.textContent = 'Не удалось подключиться к серверу';
        errBox.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Сохранить пароль';
      }
    }
  </script>
</body>
</html>
