<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinGo — Новая транзакция</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    .form-card { max-width: 480px; margin: 0 auto; }
    .amount-input { font-size: 24px; font-family: var(--font-mono); font-weight: 700; }
    .amount-input::placeholder { color: var(--muted-fg); }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
      <span>FinGo</span>
    </div>
    <a href="/dashboard" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Главная</span></a>
    <a href="/accounts" class="nav-item"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>Счета</span></a>
    <a href="/transactions" class="nav-item active"><svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg><span>Транзакции</span></a>
    <a href="/categories" class="nav-item"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><span>Категории</span></a>
    <a href="/budgets" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg><span>Бюджеты</span></a>
    <a href="/recurring" class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg><span>Регулярные</span></a>
    <a href="/reports" class="nav-item"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Аналитика</span></a>
    <div class="sidebar-spacer"></div>
    <a href="/settings" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Настройки</span></a>
    <a href="#" class="nav-item" onclick="logout();return false;"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Выйти</span></a>
  </aside>

  <main class="main-content" x-data="newTxPage()" x-cloak>
    <div class="page-header">
      <div class="page-title">
        <h1>Новая транзакция</h1>
        <p>Заполните данные транзакции</p>
      </div>
    </div>

    <!-- Error state -->
    <div x-show="error" class="error-state" x-text="error"></div>

    <!-- Skeleton loader -->
    <div x-show="loading" class="form-card">
      <div class="skeleton skeleton-row" style="height:44px;margin-bottom:24px"></div>
      <div class="skeleton skeleton-row" style="height:60px;margin-bottom:16px"></div>
      <div class="skeleton skeleton-row" style="height:60px;margin-bottom:16px"></div>
      <div class="skeleton skeleton-row" style="height:60px;margin-bottom:16px"></div>
      <div class="skeleton skeleton-row" style="height:60px;margin-bottom:16px"></div>
      <div class="skeleton skeleton-row" style="height:80px;margin-bottom:16px"></div>
    </div>

    <div class="form-card" x-show="!loading && !error">
      <!-- Type toggle -->
      <div style="margin-bottom:24px">
        <div class="type-toggle">
          <div class="toggle-opt" :class="{'active': form.type === 'expense'}" @click="form.type = 'expense'; form.category_id = ''; submitted = false">Расход</div>
          <div class="toggle-opt" :class="{'active': form.type === 'income'}" @click="form.type = 'income'; form.category_id = ''; submitted = false">Доход</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Сумма</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted-fg);font-family:var(--font-mono);font-size:20px">₽</span>
          <input type="number" class="form-input amount-input" placeholder="0.00" style="padding-left:36px" x-model="form.amount" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Категория</label>
        <select class="form-input" :class="{'input-error': submitted && !form.category_id}" style="appearance:none;cursor:pointer" x-model="form.category_id">
          <option value="" disabled>Выберите категорию</option>
          <template x-for="c in filteredCategories" :key="c.id">
            <option :value="c.id" x-text="c.name"></option>
          </template>
        </select>
        <div x-show="submitted && !form.category_id" style="color:#f87171;font-size:12px;margin-top:4px">Выберите категорию</div>
      </div>

      <div class="form-group">
        <label class="form-label">Счёт</label>
        <select class="form-input" style="appearance:none;cursor:pointer" x-model="form.account_id">
          <template x-for="a in accounts" :key="a.id">
            <option :value="a.id" x-text="a.name"></option>
          </template>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Дата</label>
        <div class="input-wrapper">
          <input type="date" class="form-input" x-model="form.date" />
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Название / описание</label>
        <textarea class="form-input" rows="3" placeholder="Введите описание..." style="resize:vertical" x-model="form.name"></textarea>
      </div>

      <!-- Save error -->
      <div x-show="saveError" class="error-state" x-text="saveError" style="margin-bottom:12px"></div>

      <!-- Insufficient funds panel -->
      <div x-show="insufficientFunds" style="background:#2d1b1b;border:1px solid #7f1d1d;border-radius:10px;padding:16px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span style="color:#f87171;font-size:13.5px;font-weight:600" x-text="insufficientFunds?.message"></span>
        </div>
        <div style="font-size:12.5px;color:var(--muted-fg);margin-bottom:10px">
          Баланс: <span style="color:#fca5a5;font-family:var(--font-mono)" x-text="fmt.money(insufficientFunds?.balance)"></span>
          &nbsp;·&nbsp;
          Нужно: <span style="color:#fca5a5;font-family:var(--font-mono)" x-text="fmt.money(insufficientFunds?.amount)"></span>
        </div>
        <template x-if="insufficientFunds?.alternatives?.length > 0">
          <div>
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted-fg);margin-bottom:8px">Счета с достаточным балансом</div>
            <template x-for="a in insufficientFunds.alternatives" :key="a.id">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface-2,#2a2a2a);border-radius:7px;margin-bottom:6px">
                <div>
                  <span style="font-size:13px" x-text="a.name"></span>
                  <span style="font-size:11px;color:var(--muted-fg);margin-left:6px" x-text="fmt.money(a.balance)"></span>
                </div>
                <button type="button" class="btn btn-primary" style="padding:4px 12px;font-size:12px" @click="switchAccount(a.id)">Использовать</button>
              </div>
            </template>
          </div>
        </template>
        <template x-if="!insufficientFunds?.alternatives?.length">
          <div style="font-size:13px;color:var(--muted-fg)">Нет других счетов с достаточным балансом.</div>
        </template>
      </div>

      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px">
        <a href="/transactions" class="btn btn-ghost">Отмена</a>
        <button type="button" class="btn btn-primary" @click="save()" :disabled="saving">
          <span x-show="saving" style="display:inline-flex;align-items:center;gap:6px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
            Сохранение...
          </span>
          <span x-show="!saving">Сохранить</span>
        </button>
      </div>
    </div>
  </main>
</div>

<style>
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>

<script>
  function newTxPage() {
    return {
      loading: true, error: null, saving: false, saveError: null, submitted: false,
      insufficientFunds: null,
      categories: [], accounts: [],
      form: { type: 'expense', amount: null, category_id: '', account_id: null, date: new Date().toISOString().slice(0,10), name: '' },
      async init() {
        try {
          const [cats, accs] = await Promise.all([api.get('/categories'), api.get('/accounts')]);
          this.categories = cats.items ?? cats;
          this.accounts = accs.items ?? accs;
          if (this.accounts[0]) this.form.account_id = this.accounts[0].id;
        } catch(e) { this.error = e.message; }
        finally { this.loading = false; }
      },
      get filteredCategories() { return this.categories.filter(c => c.type === this.form.type); },
      async save() {
        this.submitted = true;
        if (!this.form.category_id) return;
        this.saving = true; this.saveError = null; this.insufficientFunds = null;
        try {
          const payload = {
            ...this.form,
            amount: Number(this.form.amount),
            account_id: Number(this.form.account_id),
            category_id: this.form.category_id ? Number(this.form.category_id) : null,
          };
          await api.post('/transactions', payload);
          window.location.href = '/transactions';
        } catch(e) {
          if (e.data?.code === 'insufficient_funds') {
            this.insufficientFunds = e.data;
          } else {
            this.saveError = e.message;
          }
        }
        finally { this.saving = false; }
      },
      switchAccount(id) {
        this.form.account_id = id;
        this.insufficientFunds = null;
      }
    };
  }
</script>
</body>
</html>
