<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinGo — Настройки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
  <style>
    [x-cloak] { display: none !important; }
    .settings-section { background: var(--surface-1, #1e1e1e); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .settings-section h2 { font-size: 15px; font-weight: 600; margin: 0 0 20px; color: var(--fg, #e8e8e8); }
    .form-field { margin-bottom: 16px; }
    .form-field label { display: block; font-size: 12px; color: var(--muted-fg, #888); margin-bottom: 6px; }
    .form-field input { width: 100%; padding: 10px 12px; background: var(--surface-2, #2a2a2a); border: 1px solid var(--border, #333); border-radius: 8px; color: inherit; font-size: 14px; box-sizing: border-box; font-family: inherit; }
    .form-field input:focus { outline: none; border-color: var(--accent, #3b82f6); }
    .success-msg { color: #4ade80; font-size: 13px; margin-top: 8px; }
    .error-msg-inline { color: #e74c3c; font-size: 13px; margin-top: 8px; }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
  </style>
</head>
<body>
<div class="app-layout" x-data="settingsPage()" x-cloak>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
      <span>FinGo</span>
    </div>
    <a href="/dashboard" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Главная</span></a>
    <a href="/accounts" class="nav-item"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>Счета</span></a>
    <a href="/transactions" class="nav-item"><svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg><span>Транзакции</span></a>
    <a href="/categories" class="nav-item"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><span>Категории</span></a>
    <a href="/budgets" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg><span>Бюджеты</span></a>
    <a href="/recurring" class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg><span>Регулярные</span></a>
    <a href="/reports" class="nav-item"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Аналитика</span></a>
    <div class="sidebar-spacer"></div>
    <a href="/settings" class="nav-item active"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Настройки</span></a>
    <a href="#" class="nav-item" onclick="logout();return false;"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Выйти</span></a>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="page-title">
        <h1>Настройки</h1>
        <p>Управляйте профилем и безопасностью</p>
      </div>
    </div>

    <!-- Profile section -->
    <div class="settings-section">
      <h2>Профиль</h2>
      <form @submit.prevent="saveProfile()">
        <div class="form-field">
          <label>Имя</label>
          <input x-model="profile.name" type="text" placeholder="Ваше имя" required />
        </div>
        <div class="form-field">
          <label>Email</label>
          <input x-model="profile.email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="success-msg" x-show="profileSuccess" x-text="profileSuccess"></div>
        <div class="error-msg-inline" x-show="profileError" x-text="profileError"></div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" :disabled="profileLoading" x-text="profileLoading ? 'Сохранение...' : 'Сохранить'"></button>
        </div>
      </form>
    </div>

    <!-- Password section -->
    <div class="settings-section">
      <h2>Смена пароля</h2>
      <form @submit.prevent="changePassword()">
        <div class="form-field">
          <label>Текущий пароль</label>
          <input x-model="pwd.old" type="password" placeholder="••••••••" required />
        </div>
        <div class="form-field">
          <label>Новый пароль</label>
          <input x-model="pwd.new" type="password" placeholder="Минимум 6 символов" required minlength="6" />
        </div>
        <div class="form-field">
          <label>Повторите новый пароль</label>
          <input x-model="pwd.confirm" type="password" placeholder="••••••••" required minlength="6" />
        </div>
        <div class="success-msg" x-show="pwdSuccess" x-text="pwdSuccess"></div>
        <div class="error-msg-inline" x-show="pwdError" x-text="pwdError"></div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" :disabled="pwdLoading" x-text="pwdLoading ? 'Сохранение...' : 'Изменить пароль'"></button>
        </div>
      </form>
    </div>
  </main>
</div>

<script>
  function settingsPage() {
    return {
      profile: { name: '', email: '' },
      profileLoading: false,
      profileSuccess: '',
      profileError: '',
      pwd: { old: '', new: '', confirm: '' },
      pwdLoading: false,
      pwdSuccess: '',
      pwdError: '',

      async init() {
        try {
          const user = await api.get('/auth/me');
          this.profile.name = user.name || '';
          this.profile.email = user.email || '';
        } catch(e) {
          this.profileError = 'Не удалось загрузить профиль';
        }
      },

      async saveProfile() {
        this.profileSuccess = '';
        this.profileError = '';
        this.profileLoading = true;
        try {
          const user = await api.put('/user/profile', {
            name: this.profile.name,
            email: this.profile.email,
          });
          this.profile.name = user.name;
          this.profile.email = user.email;
          this.profileSuccess = 'Профиль успешно обновлён';
          setTimeout(() => { this.profileSuccess = ''; }, 3000);
        } catch(e) {
          this.profileError = e.message || 'Ошибка при сохранении профиля';
        } finally {
          this.profileLoading = false;
        }
      },

      async changePassword() {
        this.pwdSuccess = '';
        this.pwdError = '';
        if (this.pwd.new !== this.pwd.confirm) {
          this.pwdError = 'Пароли не совпадают';
          return;
        }
        this.pwdLoading = true;
        try {
          await api.put('/user/password', {
            old_password: this.pwd.old,
            new_password: this.pwd.new,
          });
          this.pwd = { old: '', new: '', confirm: '' };
          this.pwdSuccess = 'Пароль успешно изменён';
          setTimeout(() => { this.pwdSuccess = ''; }, 3000);
        } catch(e) {
          this.pwdError = e.message || 'Ошибка при смене пароля';
        } finally {
          this.pwdLoading = false;
        }
      },
    };
  }
</script>
</body>
</html>
