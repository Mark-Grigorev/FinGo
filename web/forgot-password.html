<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinGo — Восстановление пароля</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css?v=2" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <div class="logo-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
            </svg>
          </div>
          FinGo
        </div>
        <h1 class="auth-title">Забыли пароль?</h1>
        <p class="auth-subtitle">Введите email — мы пришлём ссылку для сброса</p>
      </div>

      <div id="successBox" style="display:none;color:#16a34a;font-size:13px;margin-bottom:16px;padding:12px 14px;background:rgba(22,163,74,0.08);border-radius:8px;border:1px solid rgba(22,163,74,0.3)">
        Если аккаунт с таким email существует, письмо со ссылкой для сброса пароля отправлено. Проверьте почту.
      </div>

      <form id="forgotForm" onsubmit="handleForgot(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="name@example.com" required />
        </div>

        <div id="forgotError" style="display:none;color:var(--destructive);font-size:13px;margin-bottom:12px;padding:10px 14px;background:rgba(255,92,51,0.1);border-radius:8px;border:1px solid rgba(255,92,51,0.3)"></div>

        <button type="submit" id="forgotBtn" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;">
          Отправить ссылку
        </button>
      </form>

      <p class="auth-footer">
        <a href="/">← Вернуться ко входу</a>
      </p>
    </div>
  </div>

  <script>
    async function handleForgot(e) {
      e.preventDefault();
      const btn = document.getElementById('forgotBtn');
      const errBox = document.getElementById('forgotError');
      const successBox = document.getElementById('successBox');

      btn.disabled = true;
      btn.textContent = 'Отправка...';
      errBox.style.display = 'none';
      successBox.style.display = 'none';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value }),
        });

        if (res.ok) {
          document.getElementById('forgotForm').style.display = 'none';
          successBox.style.display = 'block';
          return;
        }

        const data = await res.json().catch(() => ({}));
        errBox.textContent = data.message || 'Ошибка сервера';
        errBox.style.display = 'block';
      } catch {
        // Бэкенд недоступен — показываем success (dev-режим)
        document.getElementById('forgotForm').style.display = 'none';
        successBox.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Отправить ссылку';
      }
    }
  </script>
</body>
</html>
