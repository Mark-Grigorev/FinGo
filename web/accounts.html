<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinGo — Счета</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
  <style>
    [x-cloak] { display: none !important; }
    .skeleton-row { background: var(--surface-2, #2a2a2a); border-radius: 8px; height: 64px; margin-bottom: 12px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .error-msg { color: var(--destructive, #e74c3c); padding: 16px; font-size: 14px; background: #3d1a1a; border-radius: 8px; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="app-layout" x-data="accountsPage()" x-cloak>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
      <span>FinGo</span>
    </div>
    <a href="/dashboard" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Главная</span></a>
    <a href="/accounts" class="nav-item active"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>Счета</span></a>
    <a href="/transactions" class="nav-item"><svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg><span>Транзакции</span></a>
    <a href="/categories" class="nav-item"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><span>Категории</span></a>
    <a href="/budgets" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg><span>Бюджеты</span></a>
    <a href="/recurring" class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg><span>Регулярные</span></a>
    <a href="/reports" class="nav-item"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Аналитика</span></a>
    <div class="sidebar-spacer"></div>
    <a href="/settings" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Настройки</span></a>
    <a href="#" class="nav-item" onclick="logout();return false;"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Выйти</span></a>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="page-title">
        <h1>Счета</h1>
        <p>Управляйте вашими счетами и картами</p>
      </div>
      <button class="btn btn-primary" @click="showModal = true">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Добавить счёт
      </button>
    </div>

    <!-- Error state -->
    <div class="error-msg" x-show="error" x-text="'Ошибка загрузки: ' + error"></div>

    <!-- Total balance -->
    <div class="balance-card" style="margin-bottom:24px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div class="balance-label">Общий баланс</div>
        <div class="balance-value" x-text="fmt.money(totalBalance)"></div>
      </div>
      <div class="icon-btn" style="width:40px;height:40px">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
    </div>

    <!-- Skeleton while loading -->
    <template x-if="loading">
      <div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
      </div>
    </template>

    <!-- Account list -->
    <template x-if="!loading">
      <div>
        <template x-for="acc in accounts" :key="acc.id">
          <div class="account-item">
            <div class="account-icon" :style="'background:' + (acc.color || '#1a3d6e')" x-text="acc.icon || '💳'"></div>
            <div class="account-info">
              <div class="account-name" x-text="acc.name"></div>
              <div class="account-type" x-text="acc.type + (acc.bank ? ' · ' + acc.bank : '')"></div>
            </div>
            <div class="account-amount" x-text="fmt.money(acc.balance)"></div>
            <div class="account-actions">
              <div class="icon-btn" @click="openEdit(acc)" style="cursor:pointer">
                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </div>
              <div class="icon-btn" @click="deleteAccount(acc.id)" style="cursor:pointer">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
              </div>
            </div>
          </div>
        </template>

        <div x-show="accounts.length === 0 && !error" style="color:var(--muted-fg);font-size:13px;padding:24px 0;text-align:center">
          Нет счетов. Добавьте первый счёт.
        </div>
      </div>
    </template>
  </main>

  <!-- Модалка редактирования счёта -->
  <div x-show="showEditModal" style="position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6)" @keydown.escape.window="showEditModal=false">
    <div style="background:var(--surface-1,#1e1e1e);border-radius:12px;padding:28px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.5)" @click.stop>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h2 style="font-size:16px;font-weight:600;margin:0">Редактировать счёт</h2>
        <button @click="showEditModal=false" style="background:none;border:none;cursor:pointer;color:var(--muted-fg)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form @submit.prevent="updateAccount()">
        <div style="margin-bottom:14px">
          <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Название *</label>
          <input x-model="editForm.name" type="text" placeholder="Название счёта" required
            style="width:100%;padding:10px 12px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;color:inherit;font-size:14px;box-sizing:border-box" />
        </div>

        <div style="margin-bottom:14px">
          <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Тип</label>
          <select x-model="editForm.type" style="width:100%;padding:10px 12px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;color:inherit;font-size:14px;box-sizing:border-box">
            <option value="card">Карта</option>
            <option value="cash">Наличные</option>
            <option value="savings">Накопления</option>
            <option value="investment">Инвестиции</option>
          </select>
        </div>

        <div style="margin-bottom:14px">
          <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Валюта</label>
          <select x-model="editForm.currency" style="width:100%;padding:10px 12px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;color:inherit;font-size:14px;box-sizing:border-box">
            <option value="RUB">RUB ₽</option>
            <option value="USD">USD $</option>
            <option value="EUR">EUR €</option>
          </select>
        </div>

        <div x-show="editError" x-text="editError" style="color:#e74c3c;font-size:13px;margin-bottom:12px"></div>

        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button type="button" @click="showEditModal=false" class="btn" style="background:var(--surface-2,#2a2a2a)">Отмена</button>
          <button type="submit" class="btn btn-primary" :disabled="editLoading" x-text="editLoading ? 'Сохранение...' : 'Сохранить'"></button>
        </div>
      </form>
    </div>
  </div>

  <!-- Модалка создания счёта -->
  <div x-show="showModal" style="position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6)" @keydown.escape.window="showModal=false">
    <div style="background:var(--surface-1,#1e1e1e);border-radius:12px;padding:28px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.5)" @click.stop>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h2 style="font-size:16px;font-weight:600;margin:0">Новый счёт</h2>
        <button @click="showModal=false" style="background:none;border:none;cursor:pointer;color:var(--muted-fg)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form @submit.prevent="createAccount()">
        <div style="margin-bottom:14px">
          <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Название *</label>
          <input x-model="form.name" type="text" placeholder="Например: Основная карта" required
            style="width:100%;padding:10px 12px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;color:inherit;font-size:14px;box-sizing:border-box" />
        </div>

        <div style="margin-bottom:14px">
          <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Тип</label>
          <select x-model="form.type" style="width:100%;padding:10px 12px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;color:inherit;font-size:14px;box-sizing:border-box">
            <option value="card">Карта</option>
            <option value="cash">Наличные</option>
            <option value="savings">Накопления</option>
            <option value="investment">Инвестиции</option>
          </select>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
          <div>
            <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Валюта</label>
            <select x-model="form.currency" style="width:100%;padding:10px 12px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;color:inherit;font-size:14px;box-sizing:border-box">
              <option value="RUB">RUB ₽</option>
              <option value="USD">USD $</option>
              <option value="EUR">EUR €</option>
            </select>
          </div>
          <div>
            <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Начальный баланс</label>
            <input x-model.number="form.balance" type="number" min="0" step="0.01" placeholder="0"
              style="width:100%;padding:10px 12px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;color:inherit;font-size:14px;box-sizing:border-box" />
          </div>
        </div>

        <div x-show="formError" x-text="formError" style="color:#e74c3c;font-size:13px;margin-bottom:12px"></div>

        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button type="button" @click="showModal=false" class="btn" style="background:var(--surface-2,#2a2a2a)">Отмена</button>
          <button type="submit" class="btn btn-primary" :disabled="formLoading" x-text="formLoading ? 'Создание...' : 'Создать'"></button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  function accountsPage() {
    return {
      loading: true,
      error: null,
      accounts: [],
      showModal: false,
      formLoading: false,
      formError: null,
      form: { name: '', type: 'card', currency: 'RUB', balance: 0 },
      showEditModal: false,
      editLoading: false,
      editError: null,
      editForm: { id: null, name: '', type: 'card', currency: 'RUB' },
      get totalBalance() { return this.accounts.reduce((s, a) => s + (a.balance || 0), 0); },
      async init() {
        try {
          const res = await api.get('/accounts');
          this.accounts = res.items ?? res;
        } catch(e) { this.error = e.message; }
        finally { this.loading = false; }
      },
      async createAccount() {
        this.formError = null;
        this.formLoading = true;
        try {
          const acc = await api.post('/accounts', this.form);
          this.accounts.push(acc);
          this.showModal = false;
          this.form = { name: '', type: 'card', currency: 'RUB', balance: 0 };
        } catch(e) {
          this.formError = e.message || 'Ошибка при создании счёта';
        } finally {
          this.formLoading = false;
        }
      },
      openEdit(acc) {
        this.editForm = { id: acc.id, name: acc.name, type: acc.type || 'card', currency: acc.currency || 'RUB' };
        this.editError = null;
        this.showEditModal = true;
      },
      async updateAccount() {
        this.editError = null;
        this.editLoading = true;
        try {
          const updated = await api.put('/accounts/' + this.editForm.id, {
            name: this.editForm.name,
            type: this.editForm.type,
            currency: this.editForm.currency,
          });
          const idx = this.accounts.findIndex(a => a.id === this.editForm.id);
          if (idx !== -1) this.accounts[idx] = updated;
          this.showEditModal = false;
        } catch(e) {
          this.editError = e.message || 'Ошибка при сохранении';
        } finally {
          this.editLoading = false;
        }
      },
      async deleteAccount(id) {
        if (!confirm('Удалить счёт?')) return;
        await api.delete('/accounts/' + id);
        this.accounts = this.accounts.filter(a => a.id !== id);
      },
    };
  }


</script>
</body>
</html>
