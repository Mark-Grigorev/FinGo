<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinGo — Счета</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .skeleton-row { background: var(--surface-2, #2a2a2a); border-radius: 8px; height: 64px; margin-bottom: 12px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .error-msg { color: var(--destructive, #e74c3c); padding: 16px; font-size: 14px; background: #3d1a1a; border-radius: 8px; margin-bottom: 16px; }
  </style>
</head>
<body x-cloak>
<div class="app-layout" x-data="accountsPage()">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
      <span>FinGo</span>
    </div>
    <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Главная</span></a>
    <a href="accounts.html" class="nav-item active"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>Счета</span></a>
    <a href="transactions.html" class="nav-item"><svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg><span>Транзакции</span></a>
    <a href="categories.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><span>Вводы</span></a>
    <a href="reports.html" class="nav-item"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Аналитика</span></a>
    <div class="sidebar-spacer"></div>
    <a href="#" class="nav-item" onclick="logout();return false;"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Выйти</span></a>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="page-title">
        <h1>Счета</h1>
        <p>Управляйте вашими счетами и картами</p>
      </div>
      <a href="#" class="btn btn-primary">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Добавить счёт
      </a>
    </div>

    <!-- Error state -->
    <div class="error-msg" x-show="error" x-text="'Ошибка загрузки: ' + error"></div>

    <!-- Total balance -->
    <div class="balance-card" style="margin-bottom:24px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div class="balance-label">Общий баланс</div>
        <div class="balance-value" x-text="fmt.money(totalBalance)"></div>
      </div>
      <div class="icon-btn" style="width:40px;height:40px">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
    </div>

    <!-- Skeleton while loading -->
    <template x-if="loading">
      <div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
      </div>
    </template>

    <!-- Account list -->
    <template x-if="!loading">
      <div>
        <template x-for="acc in accounts" :key="acc.id">
          <div class="account-item">
            <div class="account-icon" :style="'background:' + (acc.color || '#1a3d6e')" x-text="acc.icon || '💳'"></div>
            <div class="account-info">
              <div class="account-name" x-text="acc.name"></div>
              <div class="account-type" x-text="acc.type + (acc.bank ? ' · ' + acc.bank : '')"></div>
            </div>
            <div class="account-amount" x-text="fmt.money(acc.balance)"></div>
            <div class="account-actions">
              <div class="icon-btn">
                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </div>
              <div class="icon-btn" @click="deleteAccount(acc.id)" style="cursor:pointer">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
              </div>
            </div>
          </div>
        </template>

        <div x-show="accounts.length === 0 && !error" style="color:var(--muted-fg);font-size:13px;padding:24px 0;text-align:center">
          Нет счетов. Добавьте первый счёт.
        </div>
      </div>
    </template>
  </main>
</div>

<script>
  function accountsPage() {
    return {
      loading: true,
      error: null,
      accounts: [],
      get totalBalance() { return this.accounts.reduce((s, a) => s + (a.balance || 0), 0); },
      async init() {
        try {
          const res = await api.get('/accounts');
          this.accounts = res.items ?? res;
        } catch(e) { this.error = e.message; }
        finally { this.loading = false; }
      },
      async deleteAccount(id) {
        if (!confirm('Удалить счёт?')) return;
        await api.delete('/accounts/' + id);
        this.accounts = this.accounts.filter(a => a.id !== id);
      },
    };
  }

  const fmt = {
    money(v) {
      if (v == null) return '₽ 0';
      return '₽ ' + Number(v).toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },
    date(v) {
      if (!v) return '—';
      return new Date(v).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
    },
  };
</script>
</body>
</html>
