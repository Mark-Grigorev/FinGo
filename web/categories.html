<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinGo — Категории</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css?v=2" />
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    .chevron { transition: transform 0.2s; }
    .collapsed .chevron { transform: rotate(-90deg); }
    [x-cloak] { display: none !important; }
    .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; max-height: 140px; overflow-y: auto; padding: 4px; }
    .emoji-btn { font-size: 20px; padding: 5px; border-radius: 6px; cursor: pointer; text-align: center; background: transparent; border: 2px solid transparent; transition: background 0.1s; }
    .emoji-btn:hover { background: var(--surface-2, #2a2a2a); }
    .emoji-btn.selected { border-color: var(--primary, #FF8400); background: var(--surface-2, #2a2a2a); }
    .cat-icon-display { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; flex-shrink: 0; }
    .cat-icon-img { width: 22px; height: 22px; object-fit: cover; border-radius: 4px; }
      .modal-overlay { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.6); }
  </style>
</head>
<body>
<div class="app-layout" x-data="categoriesPage()" x-cloak>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
      <span>FinGo</span>
    </div>
    <a href="/dashboard" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Главная</span></a>
    <a href="/accounts" class="nav-item"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>Счета</span></a>
    <a href="/transactions" class="nav-item"><svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg><span>Транзакции</span></a>
    <a href="/categories" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><span>Категории</span></a>
    <a href="/budgets" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg><span>Бюджеты</span></a>
    <a href="/recurring" class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg><span>Регулярные</span></a>
    <a href="/reports" class="nav-item"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Аналитика</span></a>
    <div class="sidebar-spacer"></div>
    <a href="/settings" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Настройки</span></a>
    <a href="#" class="nav-item" onclick="logout();return false;"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Выйти</span></a>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="page-title">
        <h1>Категории</h1>
        <p>Разделите их типы категорий доходов и расходов</p>
      </div>
      <button class="btn btn-primary" @click="showModal = true">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Добавить категорию
      </button>
    </div>

    <!-- Error state -->
    <div x-show="error" class="error-state" x-text="error"></div>

    <!-- Skeleton loaders -->
    <div x-show="loading">
      <div class="skeleton skeleton-card" style="height:48px;margin-bottom:4px"></div>
      <div class="skeleton skeleton-row" style="height:52px;margin-bottom:2px"></div>
      <div class="skeleton skeleton-row" style="height:52px;margin-bottom:2px"></div>
      <div class="skeleton skeleton-row" style="height:52px;margin-bottom:20px"></div>
      <div class="skeleton skeleton-card" style="height:48px;margin-bottom:4px"></div>
      <div class="skeleton skeleton-row" style="height:52px;margin-bottom:2px"></div>
      <div class="skeleton skeleton-row" style="height:52px;margin-bottom:2px"></div>
    </div>

    <!-- Расходы -->
    <div class="category-section" x-show="!loading && !error">
      <div class="category-section-header" @click="openSections.expense = !openSections.expense" style="cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" class="chevron" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" :style="openSections.expense ? '' : 'transform:rotate(-90deg)'"><polyline points="6 9 12 15 18 9"/></svg>
        <span class="category-section-title">Расходы</span>
        <span class="category-count" x-text="expenses.length + ' категорий'"></span>
      </div>
      <div x-show="openSections.expense">
        <template x-for="c in expenses" :key="c.id">
          <div class="category-item">
            <div class="cat-icon-display" :style="'background:' + (c.color ? c.color + '26' : 'rgba(136,136,136,0.15)')">
              <template x-if="c.icon && c.icon.startsWith('/api/uploads/')">
                <img class="cat-icon-img" :src="c.icon" :alt="c.name" />
              </template>
              <template x-if="!c.icon || !c.icon.startsWith('/api/uploads/')">
                <span style="font-size:16px;line-height:1" x-text="c.icon || '💳'"></span>
              </template>
            </div>
            <span class="cat-name" x-text="c.name"></span>
            <div class="cat-actions">
              <div class="icon-btn" @click="openEdit(c)"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
              <div class="icon-btn" style="color:var(--destructive)" @click="deleteCategory(c.id)"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Доходы -->
    <div class="category-section" x-show="!loading && !error">
      <div class="category-section-header" @click="openSections.income = !openSections.income" style="cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" class="chevron" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" :style="openSections.income ? '' : 'transform:rotate(-90deg)'"><polyline points="6 9 12 15 18 9"/></svg>
        <span class="category-section-title">Доходы</span>
        <span class="category-count" x-text="incomes.length + ' категорий'"></span>
      </div>
      <div x-show="openSections.income">
        <template x-for="c in incomes" :key="c.id">
          <div class="category-item">
            <div class="cat-icon" :style="'background:' + (c.color ? c.color + '26' : 'rgba(46,204,113,0.15)')">
              <span class="cat-dot" :style="'background:' + c.color"></span>
            </div>
            <span class="cat-name" x-text="c.name"></span>
            <div class="cat-actions">
              <div class="icon-btn" @click="openEdit(c)"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
              <div class="icon-btn" style="color:var(--destructive)" @click="deleteCategory(c.id)"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </main>

  <!-- Модалка создания категории -->
  <div x-show="showModal" class="modal-overlay" @keydown.escape.window="showModal=false">
    <div style="background:var(--surface-1,#1e1e1e);border-radius:12px;padding:28px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.5)" @click.stop>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h2 style="font-size:16px;font-weight:600;margin:0">Новая категория</h2>
        <button @click="showModal=false" style="background:none;border:none;cursor:pointer;color:var(--muted-fg)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form @submit.prevent="createCategory()">
        <div style="margin-bottom:14px">
          <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Название *</label>
          <input x-model="form.name" type="text" placeholder="Например: Продукты" required
            style="width:100%;padding:10px 12px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;color:inherit;font-size:14px;box-sizing:border-box" />
        </div>

        <div style="margin-bottom:14px">
          <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Тип *</label>
          <select x-model="form.type" style="width:100%;padding:10px 12px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;color:inherit;font-size:14px;box-sizing:border-box">
            <option value="expense">Расход</option>
            <option value="income">Доход</option>
          </select>
        </div>

        <div style="margin-bottom:14px">
          <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Иконка</label>
          <!-- Preview -->
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <div style="width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center" :style="'background:' + (form.color || '#FF8400') + '26'">
              <template x-if="form.icon && form.icon.startsWith('/api/uploads/')">
                <img :src="form.icon" style="width:26px;height:26px;object-fit:cover;border-radius:4px" />
              </template>
              <template x-if="!form.icon || !form.icon.startsWith('/api/uploads/')">
                <span style="font-size:20px" x-text="form.icon || '💳'"></span>
              </template>
            </div>
            <input x-model="form.icon" type="text" placeholder="Введите эмодзи..."
              style="flex:1;padding:8px 10px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;color:inherit;font-size:16px;box-sizing:border-box" />
            <label style="cursor:pointer" title="Загрузить изображение">
              <input type="file" accept="image/*" style="display:none" @change="uploadIcon($event, 'form')">
              <div class="icon-btn" style="width:36px;height:36px" :class="{ 'opacity-50': iconUploading }">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              </div>
            </label>
          </div>
          <!-- Emoji grid -->
          <div class="emoji-grid">
            <template x-for="e in emojiPool" :key="e">
              <button type="button" class="emoji-btn" :class="{ selected: form.icon === e }" @click="form.icon = e" x-text="e"></button>
            </template>
          </div>
        </div>

        <div style="margin-bottom:14px">
          <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Цвет</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input x-model="form.color" type="color"
              style="width:40px;height:40px;padding:2px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;cursor:pointer" />
            <span x-text="form.color" style="font-family:var(--font-mono);font-size:12px;color:var(--muted-fg)"></span>
          </div>
        </div>

        <div x-show="formError" x-text="formError" style="color:#e74c3c;font-size:13px;margin-bottom:12px"></div>

        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button type="button" @click="showModal=false" class="btn" style="background:var(--surface-2,#2a2a2a)">Отмена</button>
          <button type="submit" class="btn btn-primary" :disabled="formLoading || iconUploading" x-text="iconUploading ? 'Загрузка...' : formLoading ? 'Создание...' : 'Создать'"></button>
        </div>
      </form>
    </div>
  </div>

  <!-- Модалка редактирования категории -->
  <div x-show="showEditModal" class="modal-overlay" @keydown.escape.window="showEditModal=false">
    <div style="background:var(--surface-1,#1e1e1e);border-radius:12px;padding:28px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.5)" @click.stop>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h2 style="font-size:16px;font-weight:600;margin:0">Редактировать категорию</h2>
        <button @click="showEditModal=false" style="background:none;border:none;cursor:pointer;color:var(--muted-fg)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form @submit.prevent="updateCategory()">
        <div style="margin-bottom:14px">
          <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Название *</label>
          <input x-model="editForm.name" type="text" placeholder="Название категории" required
            style="width:100%;padding:10px 12px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;color:inherit;font-size:14px;box-sizing:border-box" />
        </div>

        <div style="margin-bottom:14px">
          <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Иконка</label>
          <!-- Preview -->
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <div style="width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center" :style="'background:' + (editForm.color || '#FF8400') + '26'">
              <template x-if="editForm.icon && editForm.icon.startsWith('/api/uploads/')">
                <img :src="editForm.icon" style="width:26px;height:26px;object-fit:cover;border-radius:4px" />
              </template>
              <template x-if="!editForm.icon || !editForm.icon.startsWith('/api/uploads/')">
                <span style="font-size:20px" x-text="editForm.icon || '💳'"></span>
              </template>
            </div>
            <input x-model="editForm.icon" type="text" placeholder="Введите эмодзи..."
              style="flex:1;padding:8px 10px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;color:inherit;font-size:16px;box-sizing:border-box" />
            <label style="cursor:pointer" title="Загрузить изображение">
              <input type="file" accept="image/*" style="display:none" @change="uploadIcon($event, 'editForm')">
              <div class="icon-btn" style="width:36px;height:36px" :class="{ 'opacity-50': iconUploading }">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              </div>
            </label>
          </div>
          <!-- Emoji grid -->
          <div class="emoji-grid">
            <template x-for="e in emojiPool" :key="e">
              <button type="button" class="emoji-btn" :class="{ selected: editForm.icon === e }" @click="editForm.icon = e" x-text="e"></button>
            </template>
          </div>
        </div>

        <div style="margin-bottom:14px">
          <label style="display:block;font-size:12px;color:var(--muted-fg);margin-bottom:6px">Цвет</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input x-model="editForm.color" type="color"
              style="width:40px;height:40px;padding:2px;background:var(--surface-2,#2a2a2a);border:1px solid var(--border,#333);border-radius:8px;cursor:pointer" />
            <span x-text="editForm.color" style="font-family:var(--font-mono);font-size:12px;color:var(--muted-fg)"></span>
          </div>
        </div>

        <div x-show="editError" x-text="editError" style="color:#e74c3c;font-size:13px;margin-bottom:12px"></div>

        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button type="button" @click="showEditModal=false" class="btn" style="background:var(--surface-2,#2a2a2a)">Отмена</button>
          <button type="submit" class="btn btn-primary" :disabled="editLoading || iconUploading" x-text="iconUploading ? 'Загрузка...' : editLoading ? 'Сохранение...' : 'Сохранить'"></button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  const EMOJI_POOL = [
    '💳','💰','💵','🪙','💎','📈','📉','🏦','💼','🧾',
    '🏠','🏡','🚗','🚕','✈️','🚂','🛒','🍔','🍕','☕',
    '🍺','🎮','📱','💻','📚','🎵','🎭','🎨','🏋️','🏃',
    '💊','🏥','👗','👟','🐾','🌿','🎓','⚡','🔧','🎁',
    '🎯','⭐','🌟','🔑','🛡️','📷','🌍','🎪','🧴','🧹',
  ];

  function categoriesPage() {
    return {
      loading: true, error: null,
      categories: [],
      openSections: { expense: true, income: true },
      emojiPool: EMOJI_POOL,
      iconUploading: false,
      showModal: false,
      formLoading: false,
      formError: null,
      form: { name: '', type: 'expense', icon: '💳', color: '#FF8400' },
      showEditModal: false,
      editLoading: false,
      editError: null,
      editForm: { id: null, name: '', icon: '', color: '#FF8400' },
      async init() {
        try {
          const res = await api.get('/categories');
          this.categories = res.items ?? res;
        } catch(e) { this.error = e.message; }
        finally { this.loading = false; }
      },
      get expenses() { return this.categories.filter(c => c.type === 'expense'); },
      get incomes()   { return this.categories.filter(c => c.type === 'income'); },
      async uploadIcon(event, target) {
        const file = event.target.files?.[0];
        if (!file) return;
        this.iconUploading = true;
        try {
          const fd = new FormData();
          fd.append('icon', file);
          const res = await fetch('/api/categories/icons', {
            method: 'POST',
            credentials: 'include',
            body: fd,
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message || 'Ошибка загрузки');
          this[target].icon = data.url;
        } catch(e) {
          if (target === 'form') this.formError = e.message;
          else this.editError = e.message;
        } finally {
          this.iconUploading = false;
          event.target.value = '';
        }
      },
      async createCategory() {
        this.formError = null;
        this.formLoading = true;
        try {
          const cat = await api.post('/categories', this.form);
          this.categories.push(cat);
          this.showModal = false;
          this.form = { name: '', type: 'expense', icon: '💳', color: '#FF8400' };
        } catch(e) {
          this.formError = e.message || 'Ошибка при создании категории';
        } finally {
          this.formLoading = false;
        }
      },
      openEdit(c) {
        this.editForm = { id: c.id, name: c.name, icon: c.icon || '', color: c.color || '#FF8400' };
        this.editError = null;
        this.showEditModal = true;
      },
      async updateCategory() {
        this.editError = null;
        this.editLoading = true;
        try {
          const updated = await api.put('/categories/' + this.editForm.id, {
            name: this.editForm.name,
            icon: this.editForm.icon,
            color: this.editForm.color,
          });
          const idx = this.categories.findIndex(c => c.id === this.editForm.id);
          if (idx !== -1) this.categories[idx] = updated;
          this.showEditModal = false;
        } catch(e) {
          this.editError = e.message || 'Ошибка при сохранении';
        } finally {
          this.editLoading = false;
        }
      },
      async deleteCategory(id) {
        if (!confirm('Удалить категорию?')) return;
        await api.delete('/categories/' + id);
        this.categories = this.categories.filter(c => c.id !== id);
      }
    };
  }
</script>
</body>
</html>
