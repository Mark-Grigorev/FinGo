version: "2"

linters:
  default: none
  enable:
    # Bugs & correctness
    - errcheck        # непроверенные ошибки
    - govet           # подозрительные конструкции (shadow, printf и т.д.)
    - staticcheck     # SA*, S*, QF* — широкий статический анализ
    - gosec           # уязвимости безопасности
    - bodyclose       # забытый resp.Body.Close()
    - sqlclosecheck   # забытый rows.Close()
    - noctx           # http-запросы без context
    - exportloopref   # захват переменной цикла (до Go 1.22)

    # Style & complexity
    - revive          # замена golint, гибко настраивается
    - gocognit        # когнитивная сложность функций
    - cyclop          # цикломатическая сложность
    - funlen          # слишком длинные функции
    - maintidx        # индекс сопровождаемости

    # Formatting & imports
    - gofmt           # стандартное форматирование
    - goimports       # сортировка импортов
    - gci             # группировка импортов (std / external / internal)

    # Code smells
    - dupl            # дублирование кода
    - gocritic        # коллекция дополнительных проверок
    - unconvert       # лишние приведения типов
    - unparam         # неиспользуемые параметры функций
    - unused          # неиспользуемый код
    - ineffassign     # присваивание без использования
    - nolintlint      # некорректные //nolint-комментарии

    # Naming
    - stylecheck      # ST* — соглашения об именовании
    - misspell        # опечатки в комментариях

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"
      - name: unused-parameter
      - name: error-return
      - name: error-naming
      - name: var-naming

  gocognit:
    min-complexity: 15

  cyclop:
    max-complexity: 10

  funlen:
    lines: 80
    statements: 50

  gci:
    sections:
      - standard
      - default
      - prefix(github.com/Mark-Grigorev/FinGo)

  dupl:
    threshold: 150

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam      # отключаем — часто ложные срабатывания

  govet:
    enable:
      - shadow

  gosec:
    excludes:
      - G601           # устарело в Go 1.22+

  misspell:
    locale: US

issues:
  exclude-rules:
    # Тесты — меньше строгости
    - path: "_test\\.go"
      linters:
        - funlen
        - dupl
        - gocognit
        - cyclop
        - gocritic

    # Генерируемые файлы
    - path: "mock_.*\\.go|.*\\.gen\\.go"
      linters:
        - all

    # main.go — разрешаем длинные функции инициализации
    - path: "cmd/main\\.go"
      linters:
        - funlen

  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
